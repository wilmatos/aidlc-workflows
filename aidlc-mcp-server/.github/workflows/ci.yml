name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Quick validation job for fast feedback
  quick-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    
    - name: Run import validation
      run: |
        python scripts/validate_imports.py $(find aidlc_mcp_server tests -name "*.py")
    
    - name: Run API consistency checks
      run: |
        python scripts/check_api_consistency.py $(find aidlc_mcp_server/tools aidlc_mcp_server/core/services -name "*.py")
    
    - name: Run smoke tests
      run: |
        python scripts/run_quick_tests.py smoke

  # Code quality job
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    
    - name: Run Black formatting check
      run: |
        black --check --line-length=100 aidlc_mcp_server tests
    
    - name: Run Ruff linting
      run: |
        ruff check aidlc_mcp_server tests
    
    - name: Run MyPy type checking
      run: |
        mypy aidlc_mcp_server --strict --ignore-missing-imports
    
    - name: Run Bandit security scan
      run: |
        bandit -r aidlc_mcp_server -f json -o bandit-report.json || true
        if [ -f bandit-report.json ]; then
          echo "Security scan completed. Check bandit-report.json for details."
        fi

  # Test suite job
  test-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quick-validation]
    
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev,test]
    
    - name: Run test validation
      run: |
        python scripts/validate_tests.py $(find tests -name "*.py")
    
    - name: Run MCP tool validation
      run: |
        python scripts/validate_mcp_tools.py $(find aidlc_mcp_server/tools -name "*.py")
    
    - name: Run quick test suite
      run: |
        python scripts/run_quick_tests.py all
    
    - name: Run unit tests with coverage
      run: |
        pytest tests/unit/ --cov=aidlc_mcp_server --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # Integration tests job
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quick-validation, code-quality]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev,test]
    
    - name: Run integration tests
      run: |
        pytest tests/integration/ -v --tb=short
    
    - name: Test MCP server startup
      run: |
        timeout 30s python -c "
        from aidlc_mcp_server import get_async_server
        import asyncio
        
        async def test_startup():
            server = get_async_server()
            print('✅ MCP server started successfully')
            return True
        
        asyncio.run(test_startup())
        "

  # Security and performance job
  security-performance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-suite]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    
    - name: Run security tests
      run: |
        pytest tests/security/ -v || echo "Security tests not found, skipping"
    
    - name: Run performance benchmarks
      run: |
        pytest tests/performance/ -v || echo "Performance tests not found, skipping"
    
    - name: Check for large files
      run: |
        find . -type f -size +1M -not -path "./.git/*" -not -path "./.venv/*" -not -path "./node_modules/*" | head -10

  # Deployment readiness check
  deployment-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test-suite, integration-tests]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Check version consistency
      run: |
        python -c "
        from aidlc_mcp_server.__version__ import __version__
        print(f'Version: {__version__}')
        assert __version__, 'Version must be set'
        "
    
    - name: Test package installation
      run: |
        pip uninstall -y aidlc-mcp-server
        pip install -e .
        python -c "import aidlc_mcp_server; print('✅ Package installs correctly')"
    
    - name: Generate deployment artifacts
      run: |
        echo "Deployment ready for version $(python -c 'from aidlc_mcp_server.__version__ import __version__; print(__version__)')"